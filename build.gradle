plugins {
    id 'org.jetbrains.kotlin.jvm' version '2.2.0'
    id 'maven-publish'
}

group = 'net.atlantisservices.sdb'
version = '1.0.2'

repositories {
    mavenCentral()
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-reflect"
}

java {
    withSourcesJar()
}

publishing {
    publications {
        maven(MavenPublication) {
            groupId = 'net.atlantisservices'
            artifactId = 'sdb'
            version = project.version

            from components.java
        }
    }

    repositories {
        maven {
            url = uri("https://repository.atlantisservices.net/repository/api/")
            credentials {
                username = project.findProperty('nexusUsername') ?: System.getenv('NEXUS_USERNAME')
                password = project.findProperty('nexusPassword') ?: System.getenv('NEXUS_PASSWORD')
            }
        }
    }
}